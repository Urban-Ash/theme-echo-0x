<a
  class="post reveal"
  th:fragment="postCard(post, index)"
  th:with="
    useThemeCover=${forceThemeCover == true || forceThemeCover == 'true'},
    hasImageCover=${!(forceThemeCover == true || forceThemeCover == 'true') && !#strings.isEmpty(post.spec.cover)}"
  th:href="@{${post.status.permalink}}"
  xmlns:th="https://www.thymeleaf.org">
  <div
    class="post-cover"
    th:classappend="${hasImageCover} ? ' cover-has-image' : ''"
    th:attr="aria-busy=${hasImageCover ? 'true' : null}">
    <div
      class="post-cover-media post-cover-formula"
      th:classappend="${hasImageCover} ? ' cover-loading-formula' : ''"
      th:attr="data-cover-index=${index},data-cover-title=${post.spec.title},aria-label=${post.spec.title},aria-hidden=${hasImageCover ? 'true' : null}"
      role="img"></div>
    <img
      class="post-cover-media cover-image-source"
      th:if="${hasImageCover}"
      th:src="${post.spec.cover}"
      th:alt="${post.spec.title}"
      data-cover-image
      loading="lazy"
      decoding="async">
    <span class="coords" th:attr="data-views=${post.stats == null ? 0 : post.stats.visit}">views · 0x000</span>
  </div>
  <div class="post-meta">
    <span th:if="${!#lists.isEmpty(post.categories)}" class="post-tags">
      <span th:each="category : ${post.categories}" th:text="${category.spec.displayName}">AI</span>
    </span>
    <span th:if="${#lists.isEmpty(post.categories) && !#lists.isEmpty(post.tags)}" class="post-tags">
      <span th:each="tag : ${post.tags}" th:text="${tag.spec.displayName}">note</span>
    </span>
    <time class="post-time" th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd HH:mm')}">2025-09-09 07:25</time>
  </div>
  <h3 class="post-title" th:text="${post.spec.title}">Post title</h3>
  <p class="post-excerpt" th:text="${post.status.excerpt}">Excerpt</p>
</a>
