<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head('Archives', site.subtitle)}"></head>
<body class="aux-page-body archives-page-body">
  <header th:replace="~{modules/header :: header(path='~/archive')}"></header>

  <div
    class="aux-page-main"
    data-pjax-root
    th:with="
      archiveItems=${archives != null ? archives.items : null},
      yearCount=${archiveItems == null ? 0 : #lists.size(archiveItems)},
      siteStats=${siteStatsFinder.getStats()},
      updatedAt=${#temporals.format(T(java.time.LocalDate).now(), 'yyyy.MM.dd')}">
    <main class="aux-page-shell archives-page-shell">
      <section class="aux-page-frame archindex-frame">
        <div class="aux-page-kicker">
          <span>// <span th:text="${siteStats.post}">33</span> posts</span>
          <span>sorted by date</span>
          <span>newest first</span>
        </div>

        <div class="aux-page-head">
          <h1 class="aux-page-title">
            <span class="stroke">~/</span><span>Arch</span><span class="accent">ives</span>
          </h1>
          <p class="aux-page-lead">
            这里按时间回卷全部输出。年份像日志分区，月份像索引块；
            沿着时间线往回扫，就能重新进入当时的现场。
          </p>
        </div>

        <div class="aux-page-stats">
          <span>years<strong th:text="${yearCount}">3</strong></span>
          <span>total posts<strong th:text="${siteStats.post}">33</strong></span>
          <span>updated<strong class="accent" th:text="${updatedAt}">2026.07.02</strong></span>
        </div>

        <div class="archindex-stream" th:if="${archiveItems != null && !#lists.isEmpty(archiveItems)}">
          <section class="archindex-group" th:each="archive : ${archiveItems}">
            <header class="archindex-year">
              <span class="year" th:text="${archive.year}">2026</span>
              <span class="count" th:text="${#lists.size(archive.months)} + ' months'">6 months</span>
            </header>

            <th:block th:each="month : ${archive.months}">
              <a
                class="archindex-row"
                th:each="post : ${month.posts}"
                th:href="@{${post.status.permalink}}">
                <span
                  class="date"
                  th:with="publishedAt=${post.spec.publishTime}">
                  <span th:text="${#temporals.format(publishedAt, 'MM / dd')}">07 / 02</span>
                  <span class="day" th:text="${#temporals.format(publishedAt, 'E')}">Wed</span>
                </span>
                <span class="title" th:text="${post.spec.title}">Post title</span>
                <span class="meta">
                  <span
                    class="cat"
                    th:text="${post.categories != null && !#lists.isEmpty(post.categories) ? post.categories[0].spec.displayName : 'uncategorized'}">category</span>
                  <span class="red" th:text="${post.stats == null || post.stats.visit == null ? 0 : post.stats.visit}">0</span>
                  <span>visits</span>
                </span>
              </a>
            </th:block>
          </section>
        </div>

        <div class="archindex-empty empty-state" th:if="${archiveItems == null || #lists.isEmpty(archiveItems)}">
          <div>
            <strong>~/empty</strong>
            时间线还没有开始记录，等第一篇文章落下日期，这里就会向后延展。
          </div>
        </div>

        <div
          class="archindex-pagination"
          th:if="${archives.hasPrevious() || archives.hasNext()}"
          th:replace="~{modules/pagination :: pagination(result=${archives})}"></div>
      </section>
    </main>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
