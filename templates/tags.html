<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head('Tags', site.subtitle)}"></head>
<body>
  <header th:replace="~{modules/header :: header(path='~/tags')}"></header>

  <div data-pjax-root>
  <main class="page-shell">
    <div class="page-hero">
      <h1>Tags</h1>
      <div class="meta">signals · cross references</div>
    </div>

    <div class="terms-grid" th:if="${!#lists.isEmpty(tags)}">
      <a class="term-card" th:each="tag : ${tags}" th:href="@{${tag.status.permalink}}">
        <span class="k">tag</span>
        <span class="v" th:text="'#' + ${tag.spec.displayName}">#tag</span>
        <span class="desc" th:text="${tag.postCount} + ' posts'">0 posts</span>
      </a>
    </div>
    <div class="empty-state" th:if="${#lists.isEmpty(tags)}">no tags yet</div>
  </main>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
