<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head('Tag Cloud', '终端风格的标签索引与热度分布页')}"></head>
<body class="aux-page-body tags-page-body">
  <header th:replace="~{modules/header :: header(path='~/tags')}"></header>

  <div
    class="aux-page-main"
    data-pjax-root
    th:with="
      tagCount=${tags == null ? 0 : #lists.size(tags)},
      siteStats=${siteStatsFinder.getStats()},
      updatedAt=${#temporals.format(T(java.time.LocalDate).now(), 'yyyy.MM.dd')}">
    <main class="aux-page-shell tags-page-shell">
      <section class="aux-page-frame tagsindex-frame">
        <div class="aux-page-kicker">
          <span>// <span th:text="${tagCount}">24</span> tags</span>
          <span>sized by frequency</span>
          <span>filtered by topic</span>
        </div>

        <div class="aux-page-head">
          <h1 class="aux-page-title tagsindex-title">
            <span class="stroke">#</span><span>tag</span><span class="accent">cloud</span>
          </h1>
          <p class="aux-page-lead">
            这些标签像散落在终端里的索引针脚。热度越高，字号越醒目；
            顺着其中任意一个下潜，都会碰到同一条支线上的回声。
          </p>
        </div>

        <div class="aux-page-stats">
          <span>tags<strong th:text="${tagCount}">24</strong></span>
          <span>total posts<strong th:text="${siteStats.post}">33</strong></span>
          <span>updated<strong class="accent" th:text="${updatedAt}">2026.07.02</strong></span>
        </div>

        <div class="tagsindex-cloud" th:if="${tags != null && !#lists.isEmpty(tags)}">
          <a
            class="tagsindex-chip"
            th:each="tag : ${tags}"
            th:href="@{${tag.status.permalink}}"
            th:style="|--tag-weight:${tag.postCount == null || tag.postCount < 1 ? 1 : tag.postCount};|"
            th:classappend="${tag.postCount != null && tag.postCount >= 12 ? ' is-hot' : (tag.postCount != null && tag.postCount >= 5 ? ' is-warm' : '')}">
            <span class="hash">#</span>
            <span class="name" th:text="${tag.spec.displayName}">security</span>
            <span class="count" th:text="${tag.postCount == null ? 0 : tag.postCount}">32</span>
          </a>
        </div>

        <div class="tagsindex-empty empty-state" th:if="${tags == null || #lists.isEmpty(tags)}">
          <div>
            <strong>~/empty</strong>
            索引区还是空的，等第一批关键词写入之后，这里会一块块亮起来。
          </div>
        </div>
      </section>
    </main>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
