<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(${error.status}, ${error.title})}"></head>
<body>
  <header th:replace="~{modules/header :: header(path='~/error')}"></header>

  <div data-pjax-root>
  <main class="page-shell">
    <div class="page-hero">
      <h1 th:text="${#strings.defaultString(error.title, 'Something broke')}">Something broke</h1>
      <div class="meta">error · fallback route</div>
    </div>
    <div class="empty-state">
      <p th:text="${#strings.defaultString(error.detail, 'The requested page could not be rendered.')}">The requested page could not be rendered.</p>
      <p><a th:href="@{/}">return home</a></p>
    </div>
  </main>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
