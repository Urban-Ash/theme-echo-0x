<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head('404', 'The requested page could not be found.')}"></head>
<body>
  <header th:replace="~{modules/header :: header(path='~/404')}"></header>

  <div data-pjax-root>
  <main class="page-shell">
    <div class="page-hero">
      <h1>404</h1>
      <div class="meta">not found · fallback route</div>
    </div>
    <div class="empty-state">
      <span class="k">missing</span>
      <span class="v">Page not found</span>
      <p class="desc" th:text="${#strings.defaultString(error.detail, 'The page you requested does not exist, has moved, or the link is no longer valid.')}">
        The page you requested does not exist, has moved, or the link is no longer valid.
      </p>
      <p><a th:href="@{/}">return home</a></p>
    </div>
  </main>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
