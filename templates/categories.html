<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head('Categories', site.subtitle)}"></head>
<body class="aux-page-body categories-page-body">
  <header th:replace="~{modules/header :: header(path='~/categories')}"></header>

  <div
    class="aux-page-main"
    data-pjax-root
    th:with="
      rootCount=${categories == null ? 0 : #lists.size(categories)},
      siteStats=${siteStatsFinder.getStats()},
      updatedAt=${#temporals.format(T(java.time.LocalDate).now(), 'yyyy.MM.dd')}">
    <main class="aux-page-shell categories-page-shell">
      <section class="aux-page-frame categories-index-frame">
        <div class="aux-page-kicker">
          <span>// <span th:text="${rootCount}">7</span> root groups</span>
          <span>tree view</span>
          <span>grouped notes</span>
        </div>

        <div class="aux-page-head">
          <h1 class="aux-page-title">
            <span class="stroke">~/</span><span>categor</span><span class="accent">ies</span>
          </h1>
          <p class="aux-page-lead">
            这里不是热词表，而是目录树。每个节点都像一段路径，
            往下走一层，就更接近问题真正被拆开的地方。
          </p>
        </div>

        <div class="aux-page-stats">
          <span>root groups<strong th:text="${rootCount}">7</strong></span>
          <span>mapped posts<strong th:text="${siteStats.post}">33</strong></span>
          <span>updated<strong class="accent" th:text="${updatedAt}">2026.07.02</strong></span>
        </div>

        <div class="catindex-tree" th:if="${categories != null && !#lists.isEmpty(categories)}">
          <th:block th:replace="~{modules/category-tree :: single(categories=${categories}, depth=${0})}"></th:block>
        </div>

        <div class="catindex-empty empty-state" th:if="${categories == null || #lists.isEmpty(categories)}">
          <div>
            <strong>~/empty</strong>
            目录树还没有开始分叉，等记录被归档之后，再回来沿着节点继续下潜。
          </div>
        </div>
      </section>
    </main>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
