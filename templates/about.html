<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(${singlePage.spec.title}, ${singlePage.status.excerpt})}"></head>
<body>
  <header th:replace="~{modules/header :: header(path='~/about')}"></header>

  <div data-pjax-root>
  <article class="article-shell">
    <header class="article-head">
      <div class="post-meta">
        <span class="idx">about</span>
        <span th:if="${singlePage.owner != null}" th:text="${singlePage.owner.displayName}">author</span>
      </div>
      <h1 th:text="${singlePage.spec.title}">About</h1>
      <p class="post-excerpt" th:text="${singlePage.status.excerpt}">About this site</p>
    </header>

    <div class="content" th:utext="${singlePage.content.content}"></div>
  </article>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
