<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org" xmlns:halo="https://www.halo.run">
<head th:replace="~{modules/head :: head(${singlePage.spec.title}, ${singlePage.status.excerpt})}"></head>
<body>
  <header th:replace="~{modules/header :: header(path=${singlePage.spec.slug == 'about' ? '~/about' : '~/' + singlePage.spec.slug})}"></header>

  <div data-pjax-root>
  <article class="article-shell">
    <header class="article-head">
      <div class="post-meta">
        <span class="idx">page</span>
        <span th:if="${singlePage.owner != null}" th:text="${singlePage.owner.displayName}">author</span>
      </div>
      <h1 th:text="${singlePage.spec.title}">Page title</h1>
      <p class="post-excerpt" th:text="${singlePage.status.excerpt}">Excerpt</p>
    </header>

    <div id="content" class="content plugin-lightgallery-content" th:utext="${singlePage.content.content}"></div>

    <section
      class="plugin-comment-shell"
      th:if="${(theme.config.plugin == null || theme.config.plugin.enableComment == null || theme.config.plugin.enableComment == true || theme.config.plugin.enableComment == 'true') && pluginFinder.available('PluginCommentWidget') && (singlePage.spec.allowComment == null || singlePage.spec.allowComment == true || singlePage.spec.allowComment == 'true')}">
      <div class="label">// comments</div>
      <halo:comment
        group="content.halo.run"
        kind="SinglePage"
        th:attr="name=${singlePage.metadata.name}" />
    </section>
  </article>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
