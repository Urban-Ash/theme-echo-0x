<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org" xmlns:halo="https://www.halo.run">
<head th:replace="~{modules/head :: head(${post.spec.title}, ${post.status.excerpt})}"></head>
<body>
  <header th:replace="~{modules/header :: header(path='~/post')}"></header>

  <div
    data-pjax-root
    th:with="
      publishedDate=${#temporals.format(post.spec.publishTime, 'yyyy / MM / dd')},
      publishedClock=${#temporals.format(post.spec.publishTime, 'E HH:mm')},
      firstCategory=${post.categories != null && !#lists.isEmpty(post.categories) ? post.categories[0] : null},
      visitCount=${post.stats == null || post.stats.visit == null ? 0 : post.stats.visit},
      forceThemeCover=${theme.config.post != null && (theme.config.post.forceThemeCover == true || theme.config.post.forceThemeCover == 'true')}">
  <aside
    class="article-toc"
    id="articleToc"
    th:if="${theme.config.post == null || theme.config.post.showToc == null || theme.config.post.showToc == true || theme.config.post.showToc == 'true'}"
    aria-label="章节导航"></aside>

  <article class="article-shell post-article-shell">
    <div
      class="post-hero-cover"
      th:classappend="${!forceThemeCover && !#strings.isEmpty(post.spec.cover)} ? ' cover-has-image' : ''"
      th:attr="aria-busy=${!forceThemeCover && !#strings.isEmpty(post.spec.cover) ? 'true' : null}">
      <div
        class="article-cover-formula post-cover-media post-cover-formula"
        th:classappend="${!forceThemeCover && !#strings.isEmpty(post.spec.cover)} ? ' cover-loading-formula' : ''"
        th:attr="data-cover-title=${post.spec.title},aria-label=${post.spec.title},aria-hidden=${!forceThemeCover && !#strings.isEmpty(post.spec.cover) ? 'true' : null}"
        role="img"></div>
      <img
        class="cover-image-source"
        th:if="${!forceThemeCover && !#strings.isEmpty(post.spec.cover)}"
        th:src="${post.spec.cover}"
        th:alt="${post.spec.title}"
        data-cover-image
        loading="lazy"
        decoding="async">
      <span class="post-hero-badge">
        <span>entry</span>
        <span class="accent" th:text="${publishedDate}">2026 / 07 / 02</span>
      </span>
    </div>

    <header class="post-hero-head">
      <div class="post-hero-meta">
        <span th:text="${publishedDate}">2026 / 07 / 02</span>
        <span class="dot">·</span>
        <span th:text="${publishedClock}">Wed 15:34</span>
        <span class="dot">·</span>
        <span
          class="accent"
          th:text="${firstCategory != null ? firstCategory.spec.displayName : 'uncategorized'}">security</span>
        <span class="dot">·</span>
        <span th:text="${visitCount} + ' visits'">0 visits</span>
      </div>
      <h1 class="post-hero-title" th:text="${post.spec.title}">Post title</h1>
      <p
        class="post-hero-lead"
        th:if="${!#strings.isEmpty(post.status.excerpt)}"
        th:text="${post.status.excerpt}">Excerpt</p>
      <div
        class="post-hero-tags"
        th:if="${!#lists.isEmpty(post.categories) || !#lists.isEmpty(post.tags)}">
        <th:block th:if="${!#lists.isEmpty(post.categories)}">
          <a
            class="post-hero-chip"
            th:each="category : ${post.categories}"
            th:href="@{${category.status.permalink}}"
            th:text="${category.spec.displayName}">category</a>
        </th:block>
        <th:block th:if="${!#lists.isEmpty(post.tags)}">
          <a
            class="post-hero-chip is-tag"
            th:each="tag : ${post.tags}"
            th:href="@{${tag.status.permalink}}"
            th:text="${'# ' + tag.spec.displayName}"># tag</a>
        </th:block>
      </div>
    </header>

    <div id="content" class="content plugin-lightgallery-content" th:utext="${post.content.content}"></div>

    <nav class="article-nav" aria-label="Post navigation">
      <a th:href="@{/archives}">../archives</a>
      <a th:href="@{/}">~/home</a>
    </nav>

    <section
      class="plugin-comment-shell"
      th:if="${(theme.config.plugin == null || theme.config.plugin.enableComment == null || theme.config.plugin.enableComment == true || theme.config.plugin.enableComment == 'true') && pluginFinder.available('PluginCommentWidget') && (post.spec.allowComment == null || post.spec.allowComment == true || post.spec.allowComment == 'true')}">
      <div class="label">// comments</div>
      <halo:comment
        group="content.halo.run"
        kind="Post"
        th:attr="name=${post.metadata.name}" />
    </section>
  </article>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
