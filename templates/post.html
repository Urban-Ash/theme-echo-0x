<!DOCTYPE html>
<html th:attr="lang=${#strings.isEmpty(site.language) ? 'zh-CN' : site.language}" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{modules/head :: head(${post.spec.title}, ${post.status.excerpt})}"></head>
<body>
  <header th:replace="~{modules/header :: header(path='~/post')}"></header>

  <div data-pjax-root>
  <aside
    class="article-toc"
    id="articleToc"
    th:if="${theme.config.post == null || theme.config.post.showToc == null || theme.config.post.showToc == true || theme.config.post.showToc == 'true'}"
    aria-label="章节导航"></aside>

  <article class="article-shell">
    <header class="article-head">
      <div class="post-meta">
        <span class="idx" th:text="${post.spec.publishTime}">publish time</span>
        <span th:if="${post.owner != null}" th:text="${post.owner.displayName}">author</span>
        <span th:text="${post.status.commentsCount} + ' comments'">0 comments</span>
      </div>
      <h1 th:text="${post.spec.title}">Post title</h1>
      <p class="post-excerpt" th:text="${post.status.excerpt}">Excerpt</p>
      <div class="post-meta" th:if="${!#lists.isEmpty(post.categories) || !#lists.isEmpty(post.tags)}">
        <span class="post-tags" th:if="${!#lists.isEmpty(post.categories)}">
          <a th:each="category : ${post.categories}" th:href="@{${category.status.permalink}}" th:text="${category.spec.displayName}">category</a>
        </span>
        <span class="post-tags" th:if="${!#lists.isEmpty(post.tags)}">
          <a th:each="tag : ${post.tags}" th:href="@{${tag.status.permalink}}" th:text="'#' + ${tag.spec.displayName}">tag</a>
        </span>
      </div>
    </header>

    <div class="article-cover">
      <img
        th:if="${!#strings.isEmpty(post.spec.cover)}"
        th:src="${post.spec.cover}"
        th:attr="data-cover-title=${post.spec.title}"
        th:alt="${post.spec.title}"
        loading="lazy"
        decoding="async">
      <div
        class="article-cover-formula post-cover-media post-cover-formula"
        th:unless="${!#strings.isEmpty(post.spec.cover)}"
        th:attr="data-cover-title=${post.spec.title},aria-label=${post.spec.title}"
        role="img"></div>
    </div>

    <div class="content" th:utext="${post.content.content}"></div>

    <nav class="article-nav" aria-label="Post navigation">
      <a th:href="@{/archives}">../archives</a>
      <a th:href="@{/}">~/home</a>
    </nav>
  </article>
  </div>

  <footer th:replace="~{modules/footer :: footer}"></footer>
  <div class="math-bg" id="mathBg"></div>
</body>
</html>
