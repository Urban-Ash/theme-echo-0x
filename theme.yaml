apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-echo-0x
spec:
  displayName: Echo 0x
  author:
    name: Codex
    website: https://openai.com
  description: Dark terminal style Halo theme for security, AI and technical notes.
  logo: /themes/theme-echo-0x/assets/branding/echo-0x-icon.svg
  homepage: https://github.com/Urban-Ash/theme-echo-0x
  repo: https://github.com/Urban-Ash/theme-echo-0x.git
  issues: https://github.com/Urban-Ash/theme-echo-0x/issues
  version: 1.3.0
  requires: 2.25.0
  settingName: theme-echo-0x-setting
  configMapName: theme-echo-0x-configMap
  customTemplates:
    page:
      - name: About
        description: About page template
        file: about.html
      - name: Links
        description: Links page template
        file: links.html
  license:
    - name: MIT
      url: https://opensource.org/licenses/MIT
